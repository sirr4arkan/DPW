<!DOCTYPE html>
<html>
<head>
    <title>Confirm Box</title>
</head>
<body>
    <button onclick="konfirmasi()">Klik</button>

    <script>
        function konfirmasi() {
            var hasil = confirm("Apakah Anda yakin?");
            if (hasil) {
                alert("Anda menekan OK");
            } else {
                alert("Anda menekan Cancel");
            }
        }
    </script>
</body>
</html>
