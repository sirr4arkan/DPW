<!DOCTYPE html>
<html>
<head>
    <title>Input Data</title>
</head>
<body>
    Nama: <input type="text" id="nama">
    <button onclick="tampil()">Submit</button>

    <script>
        function tampil() {
            var nama = document.getElementById("nama").value;
            alert("Nama Anda: " + nama);
        }
    </script>
</body>
</html>
