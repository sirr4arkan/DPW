<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Praktikum JavaScript</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: white;
            margin-top: 30px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #6c5ce7;
            color: white;
            border-radius: 8px;
        }

        .btn:hover {
            background: #5a4bcf;
        }
    </style>
</head>
<body>

<h1>📘 Dashboard Praktikum JavaScript</h1>

<div class="container">

    <div class="card">
        <p>1. Alert</p>
        <a href="program_alert.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>2. Input Data</p>
        <a href="input_data.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>3. Confirm Box</p>
        <a href="confirm_box.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>4. Validasi</p>
        <a href="validasi.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>5. Radio Box</p>
        <a href="radio_box.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>6. Password</p>
        <a href="verifikasi_password.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>7. Jam Real-Time</p>
        <a href="real_time.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>8. Penjelasan AJAX dan jQuery</p>
        <a href="penjelasan_AJAX.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>9. Menu jQuery</p>
        <a href="menu.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>10. jendela Dialog</p>
        <a href="jendela_basic.html" class="btn">Buka</a>
    </div>

    <div class="card">
        <p>11. Progress Bar</p>
        <a href="progress_bar.html" class="btn">Buka</a>
    </div>

</div>

</body>
</html>
