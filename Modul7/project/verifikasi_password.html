<!DOCTYPE html>
<html>
<head>
    <title>Password</title>
</head>
<body>
    Password: <input type="password" id="pass">
    <button onclick="cekPass()">Login</button>

    <script>
        function cekPass() {
            var pass = document.getElementById("pass").value;
            if (pass == "12345") {
                alert("Login berhasil!");
            } else {
                alert("Password salah!");
            }
        }
    </script>
</body>
</html>
