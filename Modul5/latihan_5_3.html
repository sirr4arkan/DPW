<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto Flexbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .galeri-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .galeri-flex .foto {
            width: 200px;
            height: 200px;
            background-color: #cccccc;
            border: 2px solid #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #333;
            overflow: hidden;
        }

        .galeri-flex .foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <h1>Foto kata meme anak teknik</h1>

    <div class="galeri-flex">
        <div class="foto"><img src="image/foto1.jpg" alt="Foto 1" onerror="this.parentElement.innerText='Foto 1'"></div>
        <div class="foto"><img src="image/foto2.jpg" alt="Foto 2" onerror="this.parentElement.innerText='Foto 2'"></div>
        <div class="foto"><img src="image/foto3.jpg" alt="Foto 3" onerror="this.parentElement.innerText='Foto 3'"></div>
        <div class="foto"><img src="image/foto4.jpg" alt="Foto 4" onerror="this.parentElement.innerText='Foto 4'"></div>
        <div class="foto"><img src="image/foto5.jpg" alt="Foto 5" onerror="this.parentElement.innerText='Foto 5'"></div>
        <div class="foto"><img src="image/foto6.jpg" alt="Foto 6" onerror="this.parentElement.innerText='Foto 6'"></div>

        <div class="foto"><img src="image/foto7.jpg" alt="Foto 7" onerror="this.parentElement.innerText='Foto 7'"></div>

        <div class="foto"><img src="image/foto9.jpg" alt="Foto 9" onerror="this.parentElement.innerText='Foto 9'"></div>
        <div class="foto"><img src="image/foto10.jpg" alt="Foto 10" onerror="this.parentElement.innerText='Foto 10'"></div>
        <div class="foto"><img src="image/foto11.jpg" alt="Foto 11" onerror="this.parentElement.innerText='Foto 11'"></div>

</html>
