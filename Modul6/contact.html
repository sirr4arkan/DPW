<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Arkan</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e3f2fd, #90caf9);
      color: #0d1b2a;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      color: #1565c0;
      font-weight: 600;
    }

    .hero p {
      color: #455a64;
    }

    .card-modern {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .contact-item {
      background: #ffffff;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: 0.3s;
    }

    .contact-item:hover {
      transform: translateX(5px);
      background: #e3f2fd;
    }

    .icon-box {
      font-size: 20px;
      color: #1565c0;
    }

    .btn-custom {
      background: linear-gradient(45deg, #42a5f5, #1e88e5);
      color: white;
      border-radius: 30px;
      padding: 12px;
      border: none;
      width: 100%;
    }

    .btn-custom:hover {
      background: #1565c0;
    }

    input, textarea {
      border-radius: 10px !important;
    }
  </style>
</head>

<body>

<section class="hero" data-aos="fade-down">
  <h1>Hubungi Saya</h1>
  <p>Ingin menghubungi saya? isi form dibawah ini</p>
</section>

<div class="container pb-5">
  <div class="row g-4">

    <div class="col-md-4" data-aos="fade-right">
      <div class="card-modern">

        <h5 class="mb-4">Informasi Kontak</h5>

        <div class="contact-item">
          <i class="bi bi-whatsapp icon-box"></i>
          <div>
            <strong>WhatsApp</strong><br>
            +62 8963 3833 313
          </div>
        </div>

        <div class="contact-item">
          <i class="bi bi-instagram icon-box"></i>
          <div>
            <strong>Instagram</strong><br>
            @arkannmsthf
          </div>
        </div>

        <div class="contact-item">
          <i class="bi bi-facebook icon-box"></i>
          <div>
            <strong>Facebook</strong><br>
            gada4rkan
          </div>
        </div>

        <div class="contact-item">
          <i class="bi bi-envelope icon-box"></i>
          <div>
            <strong>Email</strong><br>
            syafiarkanmusthafa@gmail.com
          </div>
        </div>

      </div>
    </div>

    <div class="col-md-8" data-aos="fade-left">
      <div class="card-modern">

        <h5 class="mb-4">Kirim Pesan</h5>

        <form action="mailto:emailkamu@gmail.com" method="POST" enctype="text/plain">

          <div class="row">
            <div class="col-md-6 mb-3">
              <input type="text" name="nama" class="form-control" placeholder="Nama Lengkap" required>
            </div>

            <div class="col-md-6 mb-3">
              <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
          </div>

          <div class="mb-3">
            <input type="text" name="subjek" class="form-control" placeholder="Subjek">
          </div>

          <div class="mb-3">
            <textarea name="pesan" rows="5" class="form-control" placeholder="Tulis pesan kamu..."></textarea>
          </div>

          <button type="submit" class="btn-custom">
            <i class="bi bi-send"></i> Kirim Pesan
          </button>

        </form>

      </div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>

</body>
</html>
